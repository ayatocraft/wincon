<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Wincon Enterprise</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Segoe UI",sans-serif;
}

body{
overflow:hidden;
background:#1e1f22;
color:white;
width:100vw;
height:100vh;
}

#desktop{
position:fixed;
inset:0;
background:linear-gradient(135deg,#1f232a,#17191f);
overflow:hidden;
}

.window{
position:absolute;
background:#2b313b;
border-radius:14px;
border:1px solid rgba(255,255,255,.08);
box-shadow:0 25px 80px rgba(0,0,0,.45);
display:flex;
flex-direction:column;
overflow:hidden;
min-width:320px;
min-height:180px;
animation:openAnim .14s ease;
}

@keyframes openAnim{
from{
opacity:0;
transform:scale(.96);
}
to{
opacity:1;
transform:scale(1);
}
}

.window.maximized{
left:0 !important;
top:0 !important;
width:100vw !important;
height:calc(100vh - 52px) !important;
border-radius:0;
}

.titlebar{
height:42px;
background:#39414d;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 10px;
cursor:move;
flex-shrink:0;
}

.title-left{
display:flex;
align-items:center;
gap:10px;
}

.window-controls{
display:flex;
gap:6px;
}

.win-btn{
width:32px;
height:32px;
border:none;
border-radius:8px;
background:#4d5767;
color:white;
cursor:pointer;
}

.win-btn:hover{
background:#64748b;
}

.content{
flex:1;
overflow:auto;
padding:14px;
background:#20242b;
}

#taskbar{
position:fixed;
left:0;
right:0;
bottom:0;
height:52px;
background:rgba(20,20,20,.92);
backdrop-filter:blur(12px);
display:flex;
align-items:center;
gap:10px;
padding:0 10px;
z-index:999999;
}

#menuBtn{
height:40px;
padding:0 16px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
cursor:pointer;
}

#taskIcons{
display:flex;
gap:8px;
}

.task-icon{
width:40px;
height:40px;
border-radius:10px;
background:#3d4654;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

.task-icon.minimized{
opacity:.45;
}

#menu{
position:fixed;
left:10px;
bottom:62px;
width:340px;
height:520px;
background:#2d333c;
border-radius:16px;
display:none;
flex-direction:column;
padding:12px;
overflow:auto;
z-index:99999999;
}

.menu-item{
width:100%;
min-height:48px;
border:none;
border-radius:10px;
background:#404a58;
color:white;
text-align:left;
padding:0 12px;
margin-bottom:8px;
cursor:pointer;
}

.menu-item:hover{
background:#556173;
}

#contextMenu{
position:fixed;
width:240px;
background:#2c313b;
border-radius:12px;
overflow:hidden;
display:none;
z-index:999999999;
}

.context-item{
height:42px;
display:flex;
align-items:center;
padding:0 12px;
cursor:pointer;
}

.context-item:hover{
background:#4c5769;
}

.action{
width:100%;
height:42px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
cursor:pointer;
}

.setting-group{
background:#343b46;
padding:12px;
border-radius:12px;
margin-bottom:12px;
}

input,
select,
textarea{
width:100%;
height:42px;
border:none;
border-radius:10px;
background:#4d5767;
color:white;
padding:0 10px;
margin-top:8px;
}

textarea{
height:260px;
resize:none;
padding:10px;
}

iframe{
width:100%;
height:100%;
border:none;
background:white;
}

.resize-handle{
position:absolute;
right:0;
bottom:0;
width:18px;
height:18px;
cursor:nwse-resize;
}

.spinner{
width:64px;
height:64px;
border:5px solid rgba(255,255,255,.2);
border-top:5px solid white;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
from{transform:rotate(0deg)}
to{transform:rotate(360deg)}
}

#bootScreen{
position:fixed;
inset:0;
background:#111;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
gap:18px;
z-index:999999999;
}

.badge{
display:inline-block;
padding:4px 8px;
border-radius:999px;
background:#475569;
font-size:12px;
margin-top:8px;
}

</style>
</head>
<body>

<div id="bootScreen">
<div class="spinner"></div>
<h1>Wincon</h1>
</div>

<div id="desktop"></div>

<div id="menu"></div>

<div id="contextMenu"></div>

<div id="taskbar">
<button id="menuBtn">Menu</button>
<div id="taskIcons"></div>
</div>


<script>
if ("serviceWorker" in navigator) {
    window.addEventListener("load", async () => {
        try {
            await navigator.serviceWorker.register("./sw.js");
            console.log("Service Worker登録完了");
        } catch (e) {
            console.error("Service Worker登録失敗", e);
        }
    });
}
const ENTERPRISE_STORAGE_KEY="winconEnterpriseApps";
const ably = new Ably.Realtime({
  token:"YOUR_TOKEN"
});

const ablyChannel =
ably.channels.get(
  "wincon-appcenter"
);
function loadEnterpriseApps(){

try{

const data=JSON.parse(
localStorage.getItem(
ENTERPRISE_STORAGE_KEY
)||"[]"
);

if(Array.isArray(data)){
window.__WINCON_ENTERPRISE_APPS__=data;
}

}catch(e){

window.__WINCON_ENTERPRISE_APPS__=[];

}

}

function saveEnterpriseApps(){

localStorage.setItem(
ENTERPRISE_STORAGE_KEY,
JSON.stringify(
window.__WINCON_ENTERPRISE_APPS__
)
);

}

const desktop=document.getElementById("desktop");
const menu=document.getElementById("menu");
const contextMenu=document.getElementById("contextMenu");
const taskIcons=document.getElementById("taskIcons");

let zIndexCounter=100;

window.__WINCON_ENTERPRISE_APPS__=
window.__WINCON_ENTERPRISE_APPS__||[];
loadEnterpriseApps();
let menuItems=JSON.parse(
localStorage.getItem("winconMenuItems")||"null"
)||[
{
title:"テストウィンドウ",
icon:"🪟",
type:"window"
},
{
title:"テストポップアップ",
icon:"⚠️",
type:"popup"
},
{
  title:"Sail Browser Beta",
  icon:"🌐",
  type:"browser",
  system:true
},
{
title:"ファイル",
icon:"📁",
type:"file",
system:true
},
{
  title:"Module Center",
  icon:"📦",
  type:"appcenter",
  system:true
},
{
  title:"Module Center Developer",
  icon:"🛠️",
  type:"appcenterdev",
  system:true
},
{
title:"タスクマネージャ",
icon:"📊",
type:"task",
system:true
},
{
title:"システム設定",
icon:"⚙️",
type:"settings",
system:true
},
{
title:"リカバリ",
icon:"🛠️",
type:"recovery",
system:true,
hidden:true
},
{
title:"電源を切る",
icon:"⏻",
type:"shutdown",
system:true
},
{
title:"お引越し",
icon:"📦",
type:"transfer",
system:true,
hidden:true
},

{
  title:"ターミナル",
  icon:"⌨️",
  type:"terminal",
  system:true
},
,{
  title:"Wincon Core Service",
  icon:"⚙️",
  type:"coreservice",
  system:true,
  hidden:true
},

{
  title:"Wincon Reset Center",
  icon:"🧹",
  type:"reset",
  system:true,
  hidden:true
}
];

function mergeEnterpriseApps(){

if(
!Array.isArray(
window.__WINCON_ENTERPRISE_APPS__
)
){
window.__WINCON_ENTERPRISE_APPS__=[];
}

menuItems=
menuItems.filter(
m=>!m.enterprise
);

window.__WINCON_ENTERPRISE_APPS__
.forEach(app=>{

menuItems.unshift({
...app,
enterprise:true
});

});

}

function boot(){

mergeEnterpriseApps();

renderMenu();

restoreState();

setupSecurityShortcut();

startTutorial();

}

setTimeout(()=>{

const bootScreen=document.getElementById("bootScreen");

if(bootScreen){
bootScreen.remove();
}

boot();

},1200);

function setupSecurityShortcut(){

window.addEventListener("keydown",e=>{

if(e.ctrlKey&&e.shiftKey){
openSecurityOptions();
}

if(e.key==="Escape"){
openSystemSettings(true);
}

});

}
function fullFactoryReset(){

if(
!confirm(
"完全初期化しますか？企業モジュールも削除されます。"
)
){
return;
}

localStorage.clear();

location.reload();

}
let hiddenCommand="";

window.addEventListener(
"keydown",
e=>{

hiddenCommand+=e.key;

hiddenCommand=
hiddenCommand.slice(-20);

if(
hiddenCommand
.toLowerCase()
.includes("fullreset")
){

fullFactoryReset();

}

}
);
document.getElementById("menuBtn").onclick=()=>{

menu.style.display=
menu.style.display==="flex"
?"none"
:"flex";

};

function renderMenu(){

menu.innerHTML="";

menuItems.forEach(item=>{

if(item.hidden)return;

const btn=document.createElement("button");

btn.className="menu-item";

btn.innerHTML=
`${item.icon} ${item.title}`;

btn.onclick=()=>{

menu.style.display="none";

switch(item.type){

case "window":
openTestWindow();
break;

case "popup":
openTestPopup();
break;

case "file":
openFileManager();
break;

case "task":
openTaskManager();
break;

case "settings":
openSystemSettings(false);
break;

case "recovery":
openRecovery();
break;

case "shutdown":
shutdownSystem();
break;

case "externalHTML":
openExternalHTML(item);
break;

case "transfer":
openTransferApp();
break;

case "terminal":
openTerminal();
break;

case "reset":
openResetCenter();
break;

case "browser":
openBrowser();
break;
case "appcenter":
  openAppCenter();
  break;

case "appcenterdev":
  openAppCenterDeveloper();
  break;
}

};

menu.appendChild(btn);

});

}

function createWindow(options){

const {
title="Window",
icon="🪟",
content="",
width=700,
height=450,
popup=false,
safe=false
}=options;

const win=document.createElement("div");

win.className="window";

win.style.width=(popup?420:width)+"px";
win.style.height=(popup?240:height)+"px";

win.style.left=
Math.random()*240+80+"px";

win.style.top=
Math.random()*120+60+"px";

win.style.zIndex=++zIndexCounter;

win.dataset.title=title;

win.innerHTML=`

<div class="titlebar">

<div class="title-left">
<div>${icon}</div>
<div>${title}</div>
</div>

<div class="window-controls">

${popup?"":`
<button class="win-btn min-btn">
<i class="fa-solid fa-minus"></i>
</button>
`}

${popup||safe?"":`
<button class="win-btn max-btn">
<i class="fa-regular fa-square"></i>
</button>
`}

${safe?"":`
<button class="win-btn close-btn">
<i class="fa-solid fa-xmark"></i>
</button>
`}

</div>

</div>

<div class="content">
${content}
</div>

${popup?"":"<div class='resize-handle'></div>"}

`;

desktop.appendChild(win);

const task=document.createElement("div");

task.className="task-icon";
task.innerHTML=icon;
task.title=title;

taskIcons.appendChild(task);

task.onclick=()=>{

win.style.display="flex";

task.classList.remove("minimized");

win.style.zIndex=++zIndexCounter;

};

const titlebar=win.querySelector(".titlebar");

let dragging=false;
let offsetX=0;
let offsetY=0;

titlebar.addEventListener("mousedown",e=>{

dragging=true;

offsetX=e.clientX-win.offsetLeft;
offsetY=e.clientY-win.offsetTop;

win.style.zIndex=++zIndexCounter;

});

window.addEventListener("mousemove",e=>{

if(!dragging)return;

if(win.classList.contains("maximized"))
return;

win.style.left=
e.clientX-offsetX+"px";

win.style.top=
e.clientY-offsetY+"px";

});

window.addEventListener("mouseup",()=>{
dragging=false;
});

const resize=win.querySelector(".resize-handle");

if(resize){

let resizing=false;
let startX,startY,startW,startH;

resize.addEventListener("mousedown",e=>{

resizing=true;

startX=e.clientX;
startY=e.clientY;

startW=win.offsetWidth;
startH=win.offsetHeight;

e.preventDefault();

});

window.addEventListener("mousemove",e=>{

if(!resizing)return;

win.style.width=
startW+(e.clientX-startX)+"px";

win.style.height=
startH+(e.clientY-startY)+"px";

});

window.addEventListener("mouseup",()=>{
resizing=false;
});

}

const closeBtn=win.querySelector(".close-btn");
const maxBtn=win.querySelector(".max-btn");
const minBtn=win.querySelector(".min-btn");

if(closeBtn){

closeBtn.onclick=()=>{

task.remove();
win.remove();

saveState();

};

}

if(maxBtn){

maxBtn.onclick=()=>{

win.classList.toggle("maximized");

};

}

if(minBtn){

minBtn.onclick=()=>{

win.style.display="none";

task.classList.add("minimized");

};

}

saveState();

return win;

}

function startFactoryReset(){

  if(!confirm("Winconを完全初期化しますか？")){
    return;
  }

  // メモリ上のデータも消す
  window.__WINCON_ENTERPRISE_APPS__ = [];

  menuItems = [];

  // LocalStorage全削除
  localStorage.clear();

  // 念のため個別削除
  localStorage.removeItem("winconEnterpriseApps");
  localStorage.removeItem("winconMenuItems");

  alert("完全初期化しました");

  location.reload();

}

function setupBrowser(){

const frame=
document.getElementById("browserFrame");

const urlBox=
document.getElementById("browserUrl");

const backBtn=
document.getElementById("browserBack");

const history=[];

function navigate(url){

if(!url)return;

if(
!url.startsWith("http://") &&
!url.startsWith("https://")
){

url=
"https://www.google.com/search?q="+
encodeURIComponent(url);

}

history.push(url);

frame.src=url;

urlBox.value=url;

}

document
.getElementById("browserGo")
.onclick=()=>{

navigate(urlBox.value);

};

urlBox.addEventListener(
"keydown",
e=>{

if(e.key==="Enter"){

navigate(urlBox.value);

}

});

backBtn.onclick=()=>{

if(history.length<2)
return;

history.pop();

const prev=
history[history.length-1];

frame.src=prev;

urlBox.value=prev;

};

}
function openTerminal(){

createWindow({
title:"ターミナル",
icon:"⌨️",
width:900,
height:600,
content:`

<div id="terminalOutput"
style="
height:90%;
overflow:auto;
font-family:monospace;
white-space:pre-wrap;
"></div>

<input
id="terminalInput"
placeholder="command"
style="margin-top:10px;"
>

`
});

setTimeout(()=>{

const output=
document.getElementById("terminalOutput");

const input=
document.getElementById("terminalInput");

print(
"Wincon Terminal\nhelp でコマンド一覧"
);

function print(text){

output.innerHTML+=text+"\n";

output.scrollTop=
output.scrollHeight;

}

input.addEventListener(
"keydown",
e=>{

if(e.key!=="Enter")
return;

const cmd=input.value.trim();

executeCommand(
cmd,
print
);

input.value="";

});

},100);

}
function executeCommand(
cmd,
print
){

const args=
cmd.split(" ");

switch(args[0]){

case "help":

print(`
help
systemscan
factreset
openapp [name]
aboutapp [name]
listapps
listapps gui
`);

break;

case "systemscan":

print(
"システム整合性チェック中..."
);

setTimeout(()=>{

print(
"問題は見つかりませんでした"
);

},1000);

break;

case "factreset":

print(
"完全リセット実行"
);

setTimeout(()=>{

fullFactoryReset();

},1000);

break;

case "openapp":

openAppCommand(
args,
print

function openAppCommand(
args,
print
){

const name=
args
.slice(1)
.filter(a=>!a.startsWith("type="))
.join(" ");

const typeArg=
args.find(
a=>a.startsWith("type=")
);

const app=
menuItems.find(
m=>m.title===name
);

if(!app){

print(
"モジュールが見つかりません"
);

return;

}

if(typeArg){

app={
...app,
popup:
typeArg==="type=popup"
};

}

if(app.type==="file")
openFileManager();

else if(app.type==="task")
openTaskManager();

else if(app.type==="settings")
openSystemSettings(false);

else if(app.type==="terminal")
openTerminal();
else if(app.type==="coreservice")
openCoreService();
else if(app.type==="appcenter")
openAppCenter();
else if(app.type==="appcenterdev")
openAppCenterDeveloper();
else if(app.type==="browser")
openBrowser();
else if(app.type==="reset")
openResetCenter();
else if(app.type==="recovery")
openRecovery();
else if(app.type==="transfer")
openTransferApp();
else if(app.type==="externalHTML")
openExternalHTML(app);

print(
`${app.title} を起動`
);

}

function normalizeGitHubPages(url){

if(url.includes("github.com")){

const parts=url
.replace("https://github.com/","")
.split("/");

return `https://${parts[0]}.github.io/${parts[1]}/`;

}

return url;

}

let transferPeer=null;
let transferChannel=null;
function getAllStorage(){

const data={};

for(
let i=0;
i<localStorage.length;
i++
){

const key=
localStorage.key(i);

data[key]=
localStorage.getItem(key);

}

return data;

}

async function startTransferSource(){

transferPeer=new RTCPeerConnection({
iceServers:[
{
urls:"stun:stun.l.google.com:19302"
}
]
})

transferChannel=
transferPeer.createDataChannel(
"wincon-transfer"
);

showTransferScreen(
"接続コード生成中..."
);

const offer=
await transferPeer.createOffer();

await transferPeer.setLocalDescription(
offer
);

await new Promise(resolve=>{

transferPeer.onicecandidate=e=>{

if(!e.candidate){
resolve();
}

};

});

const code=btoa(
JSON.stringify(
transferPeer.localDescription
)
);

prompt(
"このコードを新しい端末へ",
code
);

transferChannel.onopen=()=>{

showTransferScreen(
"転送中..."
);

transferChannel.send(
JSON.stringify(
getAllStorage()
)
);

};
const answerCode=
prompt(
"新端末の応答コード"
);

if(answerCode){

await transferPeer.setRemoteDescription(
JSON.parse(
atob(answerCode)
)
);

}
}
async function startTransferTarget(){

const offerCode=
prompt(
"接続コードを貼り付け"
);

if(!offerCode)return;


transferPeer=
new RTCPeerConnection({
iceServers:[
{
urls:"stun:stun.l.google.com:19302"
}
]
});

await transferPeer.setRemoteDescription(
JSON.parse(
atob(offerCode)
)
);

const answer=
await transferPeer.createAnswer();

await transferPeer.setLocalDescription(
answer
);

await new Promise(resolve=>{

transferPeer.onicecandidate=e=>{

if(!e.candidate){
resolve();
}

};

});

prompt(
"この応答コードを旧端末へ",
btoa(
JSON.stringify(
transferPeer.localDescription
)
)
);

transferPeer.ondatachannel=e=>{

transferChannel=e.channel;

transferChannel.onmessage=
msg=>{

const data=
JSON.parse(msg.data);

for(
const key in data
){

localStorage.setItem(
key,
data[key]
);

}

showTransferDone();

};

};

}
