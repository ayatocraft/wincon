<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Wincon お引越し</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:"Segoe UI",system-ui,sans-serif;
background:#f3f3f3;
}

.page{
display:none;
padding:30px;
max-width:700px;
margin:auto;
}

.page.active{
display:block;
}

.card{
background:white;
padding:25px;
border-radius:16px;
box-shadow:0 3px 15px #0002;
}

h1{
margin-top:0;
}

button{
width:100%;
padding:15px;
margin:8px 0;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

.primary{
background:#0078d4;
color:white;
}

.secondary{
background:#ddd;
}

.box{
background:#eee;
padding:15px;
border-radius:10px;
word-break:break-all;
}

textarea{
width:100%;
height:150px;
padding:10px;
border-radius:10px;
border:1px solid #aaa;
}

.back{
margin-bottom:15px;
}

</style>
</head>


<body>


<!-- ホーム -->

<div class="page active" id="home">

<div class="card">

<h1>📦 お引越し</h1>

<p>
Winconのデータを新しい環境へ移行します。
</p>


<button class="primary"
onclick="showPage('connect')">

🔗 接続コードで移行

</button>


<button class="primary"
onclick="showPage('file')">

📁 ファイルで移行

</button>


</div>

</div>



<!-- 接続 -->

<div class="page" id="connect">

<div class="card">

<button class="secondary back"
onclick="showPage('home')">

← 戻る

</button>


<h1>🔗 接続コード移行</h1>


<button class="primary"
onclick="createConnection()">

送信側として開始

</button>


<button class="primary"
onclick="joinConnection()">

受信側として開始

</button>


<textarea id="code"
placeholder="接続コード"></textarea>


<button onclick="copyCode()">

📋 コピー

</button>


<div class="box" id="status">
待機中
</div>


</div>

</div>




<!-- ファイル -->

<div class="page" id="file">

<div class="card">


<button class="secondary back"
onclick="showPage('home')">

← 戻る

</button>


<h1>📁 ファイル移行</h1>


<button class="primary"
onclick="exportFile()">

バックアップ作成

</button>


<button class="primary"
onclick="document.getElementById('input').click()">

バックアップ復元

</button>


<input
id="input"
type="file"
accept=".wcb"
hidden
onchange="importFile(event)"
>


<div class="box" id="fileStatus">

待機中

</div>


</div>

</div>



<script>


function showPage(id){

document.querySelectorAll(".page")
.forEach(e=>e.classList.remove("active"));

document.getElementById(id)
.classList.add("active");

}




// localStorage全部取得

function getStorage(){

let data={};

for(let i=0;i<localStorage.length;i++){

let key=localStorage.key(i);

data[key]=localStorage.getItem(key);

}

return data;

}



function restore(data){

for(let key in data){

localStorage.setItem(
key,
data[key]
);

}

}



// ファイル保存

function exportFile(){

let data={

type:"wincon-backup",

version:1,

storage:getStorage()

};


let blob=new Blob(
[
JSON.stringify(data)
],
{
type:"application/json"
}
);


let a=document.createElement("a");

a.href=URL.createObjectURL(blob);

a.download="Wincon_Backup.wcb";

a.click();


fileStatus.textContent=
"バックアップを作成しました";

}




function importFile(e){

let file=e.target.files[0];

let reader=new FileReader();


reader.onload=()=>{

let data=
JSON.parse(reader.result);


restore(data.storage);


fileStatus.textContent=
"復元しました。再起動します";


setTimeout(()=>{

location.reload();

},1500);


};


reader.readAsText(file);

}





// WebRTC

let peer;
let channel;


function createPeer(){

peer=new RTCPeerConnection({

iceServers:[
{
urls:"stun:stun.l.google.com:19302"
}
]

});

}




async function createConnection(){

createPeer();


channel=
peer.createDataChannel("wincon");


channel.onopen=()=>{

status.textContent="転送開始";

channel.send(
JSON.stringify(getStorage())
);

};


let offer=
await peer.createOffer();


await peer.setLocalDescription(offer);


await waitICE();


code.value=
btoa(
JSON.stringify(
peer.localDescription
)
);


status.textContent=
"このコードを相手へ送信してください";

}



async function joinConnection(){

createPeer();


peer.ondatachannel=e=>{

channel=e.channel;


channel.onmessage=e=>{

restore(
JSON.parse(e.data)
);


status.textContent=
"完了しました";


setTimeout(()=>{

location.reload();

},1500);


};


};



await peer.setRemoteDescription(

JSON.parse(
atob(code.value)
)

);



let answer=
await peer.createAnswer();


await peer.setLocalDescription(answer);


await waitICE();


code.value=
btoa(
JSON.stringify(
peer.localDescription
)
);


status.textContent=
"応答コードを送信してください";

}




function waitICE(){

return new Promise(resolve=>{

if(peer.iceGatheringState==="complete")
return resolve();


peer.onicegatheringstatechange=()=>{

if(
peer.iceGatheringState==="complete"
)
resolve();

};


});

}



function copyCode(){

navigator.clipboard.writeText(
code.value
);

status.textContent=
"コピーしました";

}


</script>


</body>
</html>
