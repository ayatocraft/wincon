<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Wincon お引越し</title>

<style>
body{
    font-family:system-ui,sans-serif;
    background:#f5f5f5;
    padding:30px;
}

.card{
    max-width:600px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:16px;
}

button{
    width:100%;
    padding:14px;
    margin:8px 0;
    border:0;
    border-radius:10px;
    font-size:16px;
}

.primary{
    background:#0078d4;
    color:white;
}

textarea{
    width:100%;
    height:130px;
    box-sizing:border-box;
}

#status{
    background:#eee;
    padding:12px;
    border-radius:8px;
}
</style>
</head>

<body>

<div class="card">

<h1>📦 お引越し</h1>

<button class="primary" onclick="createConnection()">
🔗 接続コードを作成
</button>

<button class="primary" onclick="joinConnection()">
🔗 接続コードを入力
</button>


<button onclick="exportFile()">
📁 ファイルへ保存
</button>

<button onclick="document.getElementById('file').click()">
📂 ファイルから復元
</button>

<input id="file" type="file"
accept=".wcb"
style="display:none"
onchange="importFile(event)">


<br>

<textarea id="code"
placeholder="接続コード"></textarea>

<button onclick="copyCode()">
📋 コピー
</button>


<div id="status">
待機中
</div>

</div>


<script>

let peer;
let channel;


// localStorage取得

function getStorage(){

    let data={};

    for(
        let i=0;
        i<localStorage.length;
        i++
    ){

        let key=localStorage.key(i);

        data[key]=
        localStorage.getItem(key);

    }

    return data;
}



// 復元

function restore(data){

    for(let key in data){

        localStorage.setItem(
            key,
            data[key]
        );

    }

}



// WebRTC設定

function createPeer(){

    peer=new RTCPeerConnection({
        iceServers:[
            {
                urls:
                "stun:stun.l.google.com:19302"
            }
        ]
    });

}



// 送信側

async function createConnection(){

    createPeer();


    channel=
    peer.createDataChannel(
        "wincon"
    );


    channel.onopen=()=>{

        status.textContent=
        "接続完了 転送中";

        channel.send(
            JSON.stringify(
                getStorage()
            )
        );

    };


    let offer=
    await peer.createOffer();


    await peer.setLocalDescription(
        offer
    );


    await waitICE();


    code.value=
    btoa(
        JSON.stringify(
            peer.localDescription
        )
    );


    status.textContent=
    "このコードを相手へ送信してください";

}



// 受信側

async function joinConnection(){

    createPeer();


    peer.ondatachannel=e=>{

        channel=e.channel;


        channel.onmessage=e=>{

            let data=
            JSON.parse(
                e.data
            );


            restore(data);


            status.textContent=
            "完了。再起動します";


            setTimeout(()=>{

                location.reload();

            },1500);


        };

    };


    let offer=
    JSON.parse(
        atob(
            code.value
        )
    );


    await peer.setRemoteDescription(
        offer
    );


    let answer=
    await peer.createAnswer();


    await peer.setLocalDescription(
        answer
    );


    await waitICE();


    code.value=
    btoa(
        JSON.stringify(
            peer.localDescription
        )
    );


    status.textContent=
    "このコードを相手へ返してください";

}



// ICE待ち

function waitICE(){

    return new Promise(resolve=>{

        if(
            peer.iceGatheringState==="complete"
        ){
            resolve();
            return;
        }


        peer.onicegatheringstatechange=()=>{

            if(
              peer.iceGatheringState==="complete"
            ){

                resolve();

            }

        };

    });

}



// コピー

function copyCode(){

    navigator.clipboard.writeText(
        code.value
    );

}



// ファイル保存

function exportFile(){

    let backup={

        type:"wincon-backup",

        version:1,

        storage:getStorage()

    };


    let blob=
    new Blob(
        [
            JSON.stringify(
                backup
            )
        ],
        {
            type:"application/json"
        }
    );


    let a=
    document.createElement("a");

    a.href=
    URL.createObjectURL(blob);

    a.download=
    "Wincon_Backup.wcb";

    a.click();

}



// ファイル復元

function importFile(e){

    let file=
    e.target.files[0];


    let reader=
    new FileReader();


    reader.onload=()=>{

        let backup=
        JSON.parse(
            reader.result
        );


        restore(
            backup.storage
        );


        status.textContent=
        "復元しました。再起動します";


        setTimeout(()=>{

            location.reload();

        },1500);

    };


    reader.readAsText(file);

}


</script>

</body>
</html>
