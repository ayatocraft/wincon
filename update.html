<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>🚀 Wincon Update</title>

<style>
body{
    margin:0;
    background:#f4f4f4;
    font-family:"Segoe UI",sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.window{
    width:500px;
    background:white;
    border-radius:12px;
    box-shadow:0 10px 35px rgba(0,0,0,.18);
    overflow:hidden;
}

.title{
    background:#0067C0;
    color:white;
    padding:14px 18px;
    font-size:22px;
}

.content{
    padding:24px;
}

.company{
    color:#666;
    margin-bottom:12px;
}

.status{
    background:#f7f7f7;
    border:1px solid #ddd;
    border-radius:8px;
    padding:15px;
    margin-bottom:20px;
    line-height:1.7;
}

button{
    width:100%;
    padding:14px;
    border:0;
    border-radius:8px;
    background:#0067C0;
    color:white;
    font-size:17px;
    cursor:pointer;
}

button:disabled{
    opacity:.6;
    cursor:default;
}

.footer{
    margin-top:18px;
    text-align:center;
    color:#888;
    font-size:13px;
    white-space:pre-line;
}
</style>

</head>

<body>

<div class="window">

<div class="title">
🚀 Wincon Update
</div>


<div class="content">

<div class="company" id="company"></div>


<div class="status">
<b>状態</b><br>
<span id="status">
待機中
</span>
</div>


<button id="update">
更新して再起動
</button>


<div class="footer">
更新が見つかった場合は自動的に適用されます。
すべてのシステムモジュール、Wincon Update Centerも更新されます。
</div>


</div>

</div>


<script>

const status =
document.getElementById("status");

const button =
document.getElementById("update");

const company =
document.getElementById("company");


// 企業名表示
const companyName =
localStorage.getItem("companyName");

if(companyName){
    company.textContent = companyName;
}


// Service Worker確認
(async()=>{

    const reg =
    await navigator.serviceWorker.getRegistration();

    if(reg){

        status.textContent =
        "Service Workerは正常に動作しています";

    }else{

        status.textContent =
        "Service Workerが見つかりません";

    }

})();



button.onclick = async()=>{


    if(!confirm(
        "Winconを再起動して更新を確認します。\n\n続行しますか？"
    )){
        return;
    }


    button.disabled = true;


    try{


        status.textContent =
        "キャッシュを削除しています...";


        // Wincon本体キャッシュ削除
        await caches.delete(
            "wincon-cache-v1"
        );



        status.textContent =
        "Service Workerを更新しています...";


        const reg =
        await navigator.serviceWorker.getRegistration();


        if(reg){

            await reg.update();

        }



        status.textContent =
        "Winconを再起動しています...";



        setTimeout(()=>{


            // 親のWincon本体を再読み込み
            window.parent.location.reload();


        },1000);



    }catch(error){


        console.error(error);


        status.textContent =
        "更新に失敗しました";


        button.disabled=false;


    }


};

</script>


</body>
</html>
